<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // GitHub Pages SPA redirect
        // This script handles client-side routing for Next.js static export on GitHub Pages
        
        var pathSegmentsToKeep = 1; // Keep /portflio/ in the path
        
        var l = window.location;
        var pathname = l.pathname;
        
        // Check if we're already on the correct path
        if (pathname.startsWith('/portflio/') || pathname === '/portflio') {
            // Already on correct path, redirect to index with query
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                '/portflio/?/' +
                pathname.replace('/portflio/', '').replace('/portflio', '') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        } else {
            // Not on correct path, redirect to portflio base
            l.replace('/portflio/');
        }
    </script>
</head>
<body>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h2>Redirecting...</h2>
        <p>If you are not redirected automatically, <a href="/portflio/">click here</a>.</p>
    </div>
</body>
</html>
